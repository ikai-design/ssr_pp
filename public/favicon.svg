<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Simple Screen Recorder">
  <rect width="32" height="32" rx="8" fill="#863bff"/>
  <!-- Monitor bezel -->
  <rect x="5" y="6" width="17" height="13" rx="2.5" fill="#f4f4f5"/>
  <!-- Screen -->
  <rect x="7" y="8" width="13" height="9" rx="1.5" fill="#18181b"/>
  <!-- Recording indicator -->
  <circle cx="23.5" cy="9.5" r="3.25" fill="#f43f5e"/>
  <!-- Stand -->
  <rect x="12" y="21" width="8" height="2.5" rx="1.25" fill="#f4f4f5"/>
</svg>
