<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f9f9f9" />
    <title>Server error | Simple Screen Recorder</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        color-scheme: light;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: #f9f9f9;
        color: #18181b;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem max(1.5rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom))
          max(1.5rem, env(safe-area-inset-left));
        text-align: center;
        line-height: 1.5;
      }
      .code {
        font-size: clamp(3rem, 12vw, 4.5rem);
        font-weight: 600;
        letter-spacing: -0.06em;
        color: #d4d4d8;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: clamp(1.25rem, 4vw, 1.75rem);
        font-weight: 600;
        letter-spacing: -0.03em;
        margin-bottom: 0.5rem;
      }
      p {
        color: #52525b;
        max-width: 26rem;
        margin-bottom: 1.5rem;
        font-size: 1rem;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-bottom: 1.5rem;
      }
      a.btn,
      button.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        text-decoration: none;
        border-radius: 9999px;
        font-weight: 500;
        font-size: 0.9rem;
        border: none;
        cursor: pointer;
        font-family: inherit;
      }
      a.btn-primary {
        background: #000;
        color: #fff;
      }
      a.btn-primary:hover {
        background: #27272a;
      }
      button.btn-secondary {
        background: #fff;
        color: #18181b;
        border: 1px solid #e4e4e7;
      }
      button.btn-secondary:hover {
        background: #f4f4f5;
      }
      .footer-contact {
        font-size: 0.9375rem;
      }
      .footer-contact a {
        color: #52525b;
        font-weight: 500;
        text-decoration: none;
      }
      .footer-contact a:hover {
        color: #18181b;
      }
    </style>
  </head>
  <body>
    <div class="code" aria-hidden="true">500</div>
    <h1>Something went wrong</h1>
    <p>
      We couldn’t complete that request. Please try again in a few moments. If the problem continues, contact support with
      what you were trying to do.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Back to home</a>
      <button type="button" class="btn btn-secondary" onclick="location.reload()">Reload page</button>
    </div>
    <p class="footer-contact">
      <a
        href="mailto:info@simple-screen-recorder.com?subject=Simple%20Screen%20Recorder%20%E2%80%94%20support"
        title="Opens your email app to compose a message."
        >Contact</a
      >
    </p>
  </body>
</html>
